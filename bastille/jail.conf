base {
    host.hostname = "Pi-jail.local";
    path = "/usr/local/bastille/jails/base/root";

    exec.clean;
    exec.start = "/bin/sh /etc/rc";
    exec.stop = "/bin/sh /etc/rc.shutdown jail";

    mount.devfs;

    interface = "wg1";
    ip4.addr = "10.0.0.1/24";
    ip6 = "disable";

    allow.raw_sockets = 1;
    enforce_statfs = 2;
}
